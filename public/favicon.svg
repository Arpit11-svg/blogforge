<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Vibrant Forged Yellow/Gold Gradient -->
    <linearGradient id="forgeYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D" /> <!-- Warm Light Yellow -->
      <stop offset="50%" stop-color="#F59E0B" /> <!-- Amber/Gold -->
      <stop offset="100%" stop-color="#D97706" /> <!-- Deep Forged Gold -->
    </linearGradient>
  </defs>

  <!-- Stylized 'B' with sleek inner cutouts and a sharp, modern profile -->
  <path d="M 25,15 
           L 60,15 
           C 78,15 82,32 72,42 
           C 85,50 80,72 55,72 
           L 25,72 
           L 25,85 
           L 15,85 
           L 15,15 
           Z 
           M 30,25 
           L 30,38 
           L 54,38 
           C 62,38 62,25 54,25 
           Z 
           M 30,48 
           L 30,62 
           L 52,62 
           C 60,62 60,48 52,48 
           Z" 
        fill="url(#forgeYellow)" />
        
  <!-- Small dynamic accent slice to give it a "forge/crafted" feel -->
  <path d="M 15,43 L 25,43 L 25,47 L 15,47 Z" fill="#FFF" opacity="0.4"/>
</svg>
